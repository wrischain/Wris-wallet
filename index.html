<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRIS — Multichain Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bip39@3.1.0/src/index.js"></script>
<style>
  :root {
    --bg-void: #050A14;
    --bg-deep: #0D1B2A;
    --bg-panel: rgba(13, 27, 42, 0.85);
    --bg-glass: rgba(255, 255, 255, 0.04);
    --cyan: #00D4FF;
    --cyan-dim: rgba(0, 212, 255, 0.15);
    --cyan-glow: rgba(0, 212, 255, 0.4);
    --violet: #7B2FFF;
    --violet-dim: rgba(123, 47, 255, 0.15);
    --violet-glow: rgba(123, 47, 255, 0.4);
    --mint: #00FFB2;
    --red: #FF3B5C;
    --text-primary: #E8F4FF;
    --text-secondary: #7A9BBF;
    --text-dim: #3D5A7A;
    --border: rgba(0, 212, 255, 0.12);
    --border-hover: rgba(0, 212, 255, 0.35);
    --radius: 16px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123,47,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(0,212,255,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; }

  .view { display: none; min-height: 100vh; }
  .view.active { display: flex; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(5, 10, 20, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 22px; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo span { font-size: 10px; letter-spacing: 2px; display: block; color: var(--text-secondary); -webkit-text-fill-color: var(--text-secondary); background: none; font-family: 'Inter', sans-serif; margin-top: -2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .net-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    background: var(--bg-glass); border: 1px solid var(--border);
    font-size: 12px; color: var(--text-secondary); cursor: pointer;
    transition: all 0.2s;
  }
  .net-badge:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .net-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 6px var(--mint); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px; border-radius: var(--radius-sm); border: none;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.25s; white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan) 0%, #0099CC 100%);
    color: #050A14; box-shadow: 0 0 24px var(--cyan-glow);
  }
  .btn-primary:hover { box-shadow: 0 0 40px var(--cyan-glow); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--bg-glass); border: 1px solid var(--border);
    color: var(--text-primary);
  }
  .btn-secondary:hover { border-color: var(--border-hover); background: var(--cyan-dim); }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  #app { display: flex; }

  #view-welcome {
    flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 24px 40px; text-align: center; gap: 0; width: 100%;
  }
  .welcome-logo {
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 12px; line-height: 1;
    background: linear-gradient(135deg, var(--cyan) 0%, #FFFFFF 40%, var(--violet) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 40px rgba(0,212,255,0.3));
    margin-bottom: 8px;
  }
  .welcome-sub {
    font-size: 11px; letter-spacing: 6px; color: var(--text-secondary);
    text-transform: uppercase; font-weight: 500; margin-bottom: 60px;
  }
  .welcome-chains {
    display: flex; gap: 12px; margin-bottom: 60px; flex-wrap: wrap; justify-content: center;
  }
  .chain-pill {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); font-size: 12px;
    color: var(--text-secondary); background: var(--bg-glass);
    display: flex; align-items: center; gap: 6px;
  }
  .welcome-actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; margin: 0 auto; }
  .welcome-actions .btn { padding: 16px 24px; font-size: 15px; border-radius: var(--radius); }
  .welcome-divider {
    font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-align: center;
  }
  .welcome-footer { margin-top: 48px; font-size: 11px; color: var(--text-dim); }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spin { animation: spin 1s linear infinite; }
</style>
<body>

<div id="app">
  <div id="view-welcome" class="view active">
    <div class="welcome-logo">WRIS</div>
    <div class="welcome-sub">Non-Custodial Multichain Wallet</div>
    <div class="welcome-chains">
      <div class="chain-pill">⟠ Ethereum</div>
      <div class="chain-pill">🟣 Polygon</div>
      <div class="chain-pill">🔵 Base</div>
      <div class="chain-pill">⚫ Arbitrum</div>
    </div>
    <div class="welcome-actions">
      <button class="btn btn-primary btn-full">Create New Wallet</button>
      <div class="welcome-divider">OR</div>
      <button class="btn btn-secondary btn-full">Import Existing</button>
    </div>
    <div class="welcome-footer">Non-custodial • Self-hosted • Privacy First</div>
  </div>
</div>

<script>
console.log('WRIS Wallet initialized');
</script>

</body>
</html>
